{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Register New Bike</h2>
        <form method="POST">

            <!-- Customer Search with Autocomplete -->
            <div class="mb-3" style="position:relative;">
                <label class="form-label">Customer *</label>
                <input type="text" id="customer-search" class="form-control"
                       placeholder="Type customer name or phone..."
                       autocomplete="off">
                <input type="hidden" name="customer_id" id="customer-id" required>
                <small class="text-muted">Type and select a customer from the list</small>
                <div id="customer-suggestions"
                     style="border:1px solid #dee2e6;border-top:none;border-radius:0 0 8px 8px;display:none;max-height:200px;overflow-y:auto;background:white;position:absolute;width:100%;z-index:999;">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Bike Number *</label>
                <input type="text" name="bike_number" class="form-control"
                       placeholder="MH12AB1234" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Bike Model *</label>
                <input type="text" name="bike_model" class="form-control"
                       placeholder="Honda Activa" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Brand</label>
                <input type="text" name="brand" class="form-control"
                       placeholder="Honda">
            </div>
            <div class="mb-3">
                <label class="form-label">Year</label>
                <input type="number" name="year" class="form-control"
                       placeholder="2022">
            </div>
            <button type="submit" class="btn btn-primary w-100">Register Bike</button>
            <a href="/bikes" class="btn btn-secondary w-100 mt-2">Cancel</a>
        </form>
    </div>
</div>

<script>
const customers = [
    {% for c in customers %}
    {
        id    : {{ c.id }},
        name  : "{{ c.name }}",
        phone : "{{ c.phone }}"
    },
    {% endfor %}
];

const searchInput     = document.getElementById('customer-search');
const customerIdInput = document.getElementById('customer-id');
const suggestions     = document.getElementById('customer-suggestions');

searchInput.addEventListener('input', function() {
    const query = this.value.toLowerCase().trim();
    suggestions.innerHTML = '';
    customerIdInput.value = '';

    if (query.length === 0) {
        suggestions.style.display = 'none';
        return;
    }

    const filtered = customers.filter(c =>
        c.name.toLowerCase().includes(query) ||
        c.phone.includes(query)
    );

    if (filtered.length === 0) {
        suggestions.style.display = 'none';
        return;
    }

    filtered.forEach(c => {
        const div = document.createElement('div');
        div.style.cssText = 'padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid #f0f0f0;';
        div.innerHTML = `<strong>${c.name}</strong>
                         <span style="color:#888;font-size:12px;">
                         ${c.phone}</span>`;

        div.addEventListener('mouseenter', () => div.style.background = '#f8f9fa');
        div.addEventListener('mouseleave', () => div.style.background = 'white');

        div.addEventListener('click', () => {
            searchInput.value     = c.name + ' - ' + c.phone;
            customerIdInput.value = c.id;
            suggestions.style.display = 'none';
        });

        suggestions.appendChild(div);
    });

    suggestions.style.display = 'block';
});

document.addEventListener('click', function(e) {
    if (!searchInput.contains(e.target)) {
        suggestions.style.display = 'none';
    }
});
</script>

{% endblock %}
