{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Edit Bike</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Customer *</label>
                <select name="customer_id" class="form-select" required>
                    <option value="">-- Select Customer --</option>
                    {% for c in customers %}
                    <option value="{{ c.id }}"
                        {% if c.id == bike.customer_id %}selected{% endif %}>
                        {{ c.name }} - {{ c.phone }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Bike Number *</label>
                <input type="text" name="bike_number" class="form-control"
                       value="{{ bike.bike_number }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Bike Model *</label>
                <input type="text" name="bike_model" class="form-control"
                       value="{{ bike.bike_model }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Brand</label>
                <input type="text" name="brand" class="form-control"
                       value="{{ bike.brand or '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Year</label>
                <input type="number" name="year" class="form-control"
                       value="{{ bike.year or '' }}">
            </div>
            <button type="submit" class="btn btn-primary w-100">Update Bike</button>
            <a href="/bikes" class="btn btn-secondary w-100 mt-2">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
