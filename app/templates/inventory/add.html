{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Add Spare Part</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Part Name *</label>
                <input type="text" name="name" class="form-control"
                       placeholder="Engine Oil" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category" class="form-select">
                    <option value="">-- Select Category --</option>
                    <option>Engine</option>
                    <option>Brakes</option>
                    <option>Electrical</option>
                    <option>Tyres</option>
                    <option>Body Parts</option>
                    <option>Filters</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Price (₹) *</label>
                <input type="number" name="price" class="form-control"
                       placeholder="450" step="0.01" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Current Stock *</label>
                <input type="number" name="stock" class="form-control"
                       placeholder="10" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Minimum Stock (alert level)</label>
                <input type="number" name="min_stock" class="form-control"
                       placeholder="5" value="5">
            </div>
            <button type="submit" class="btn btn-primary w-100">Add Part</button>
            <a href="/inventory" class="btn btn-secondary w-100 mt-2">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
