{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Edit Spare Part</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Part Name *</label>
                <input type="text" name="name" class="form-control"
                       value="{{ part.name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category" class="form-select">
                    <option value="">-- Select Category --</option>
                    {% for cat in ['Engine','Brakes','Electrical','Tyres','Body Parts','Filters','Other'] %}
                    <option {% if part.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Price (₹) *</label>
                <input type="number" name="price" class="form-control"
                       value="{{ part.price }}" step="0.01" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Current Stock *</label>
                <input type="number" name="stock" class="form-control"
                       value="{{ part.stock }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Minimum Stock</label>
                <input type="number" name="min_stock" class="form-control"
                       value="{{ part.min_stock }}">
            </div>
            <button type="submit" class="btn btn-primary w-100">Update Part</button>
            <a href="/inventory" class="btn btn-secondary w-100 mt-2">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
