<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Bike Garage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f0f2f5;">

<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height:100vh;">
        <div class="col-md-4">

            <div class="text-center mb-4">
                <h2 class="fw-bold">🔧 Bike Garage</h2>
                <p class="text-muted"></p>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} alert-dismissible fade show">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <input type="text" name="username" class="form-control"
                                   placeholder="Enter username" required autofocus>
                        </div>

                        <div class="mb-4">
    <div class="d-flex justify-content-between align-items-center">
        <label class="form-label fw-bold mb-0">Password</label>
        <a href="/forgot-password" style="font-size:13px;"
           class="text-muted">Forgot password?</a>

        <a href="/forgot-username" style="font-size:13px;"
           class="text-muted"> Forgot username? </a>

    </div>
    <input type="password" name="password" class="form-control mt-1"
           placeholder="Enter password" required>
</div>
                        <!-- <div class="mb-4">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" name="password" class="form-control"
                                   placeholder="Enter password" required>
                        </div> -->
                        <button type="submit" class="btn btn-dark w-100 py-2">
                            Login
                        </button>
                    </form>

                    <hr>
                    <p class="text-center text-muted mb-0" style="font-size:13px;">
                        No account?
                        <a href="/register" class="text-dark fw-bold">Create one</a>
                    </p>
                    <!-- <p class="text-center text-muted mb-0" style="font-size:13px;">
    Forgot username?
    <a href="/forgot-username" class="text-dark fw-bold">Recover it</a>
</p> -->
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
