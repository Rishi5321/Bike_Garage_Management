{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">New Service</h2>
        <form method="POST">

            <!-- Bike Search with Autocomplete -->
            <div class="mb-3" style="position:relative;">
                <label class="form-label">Bike *</label>
                <input type="text" id="bike-search" class="form-control"
                       placeholder="Type bike number or customer name..."
                       autocomplete="off">
                <input type="hidden" name="bike_id" id="bike-id" required>
                <small class="text-muted">Type bike number or customer name and select from list</small>
                <div id="bike-suggestions"
                     style="border:1px solid #dee2e6;border-top:none;border-radius:0 0 8px 8px;display:none;max-height:200px;overflow-y:auto;background:white;position:absolute;width:100%;z-index:999;">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Service Type *</label>
                <select name="service_type" class="form-select" required>
                    <option value="">-- Select Service --</option>
                    {% for st in service_types %}
                    <option value="{{ st }}">{{ st }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3"
                          placeholder="Describe the problem or work done..."></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Cost (₹)</label>
                <input type="number" name="cost" class="form-control"
                       placeholder="0.00" step="0.01">
            </div>
            <button type="submit" class="btn btn-primary w-100">Create Service</button>
            <a href="/services" class="btn btn-secondary w-100 mt-2">Cancel</a>
        </form>
    </div>
</div>

<script>
const bikes = [
    {% for b in bikes %}
    {
        id       : {{ b.id }},
        number   : "{{ b.bike_number }}",
        model    : "{{ b.bike_model }}",
        customer : "{{ b.customer.name }}",
        phone    : "{{ b.customer.phone }}"
    },
    {% endfor %}
];

const searchInput = document.getElementById('bike-search');
const bikeIdInput = document.getElementById('bike-id');
const suggestions = document.getElementById('bike-suggestions');

searchInput.addEventListener('input', function() {
    const query = this.value.toLowerCase().trim();
    suggestions.innerHTML = '';
    bikeIdInput.value = '';

    if (query.length === 0) {
        suggestions.style.display = 'none';
        return;
    }

    const filtered = bikes.filter(b =>
        b.number.toLowerCase().includes(query)   ||
        b.model.toLowerCase().includes(query)    ||
        b.customer.toLowerCase().includes(query) ||
        b.phone.includes(query)
    );

    if (filtered.length === 0) {
        suggestions.style.display = 'none';
        return;
    }

    filtered.forEach(b => {
        const div = document.createElement('div');
        div.style.cssText = 'padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid #f0f0f0;';
        div.innerHTML = `
            <strong>${b.number}</strong>
            <span style="color:#555;font-size:12px;"> — ${b.model}</span>
            <br>
            <span style="color:#888;font-size:12px;">
                ${b.customer} | ${b.phone}
            </span>`;

        div.addEventListener('mouseenter', () => div.style.background = '#f8f9fa');
        div.addEventListener('mouseleave', () => div.style.background = 'white');

        div.addEventListener('click', () => {
            searchInput.value = b.number + ' - ' + b.model + ' (' + b.customer + ')';
            bikeIdInput.value = b.id;
            suggestions.style.display = 'none';
        });

        suggestions.appendChild(div);
    });

    suggestions.style.display = 'block';
});

document.addEventListener('click', function(e) {
    if (!searchInput.contains(e.target)) {
        suggestions.style.display = 'none';
    }
});
</script>

{% endblock %}
